<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Global Investor Dashboard</title>
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="style.css">
</head>
<div id="tabs">
<button class="tabBtn active" data-tab="portfolioTab">Portfolio</button>
<button class="tabBtn" data-tab="insightsTab">Insights</button>
</div>
<div id="portfolioTab" class="tabContent active">
<body>

<header>
<h1>Global Portfolio</h1>
</header>

<section id="summary">

<div class="card">
<h3>Total Portfolio</h3>
<p id="totalValue">€0</p>
</div>

<div class="card">
<h3>Total Assets</h3>
<p id="assetCount">0</p>
</div>

</section>
<div id="assetForm" class="card">

<h3>Add Asset</h3>
<input id="assetName" placeholder="Asset Name" required>

<input id="assetTicker" placeholder="Ticker (example: NVDA or BTC-USD)">

<select id="assetBroker">
<option value="">Broker</option>
<option>Kite</option>
<option>Scalable</option>
<option>TradeRepublic</option>
<option>eToro</option>
</select>

<select id="assetType">
<option value="">Asset Type</option>
<option>Stock</option>
<option>ETF</option>
<option>Crypto</option>
<option>Mutual Fund</option>
</select>

<select id="assetCurrency">
<option value="EUR">EUR</option>
<option value="USD">USD</option>
<option value="INR">INR</option>
</select>
<input id="assetQty" type="number" step="any" placeholder="Quantity" required>

<input id="assetPrice" type="number" step="any" placeholder="Buy Price">

<input id="assetDate" type="date">

<button id="saveAsset">Add Asset</button>

</div>
<section>

<table id="assetTable">
<thead>
<tr>
<th>Asset</th>
<th>Qty</th>
<th>Buy</th>
<th>Current</th>
<th>P/L</th>
<th>Last Buy</th>
</tr>
</thead>

<tbody></tbody>
</table>

</section>
</div>
<div id="insightsTab" class="tabContent">

<div class="card">
<h3>Asset Allocation</h3>
<canvas id="allocationChart"></canvas>
</div>

<div class="card">
<h3>Currency Exposure</h3>
<canvas id="currencyChart"></canvas>
</div>

<div class="card">
<h3>Portfolio Growth</h3>
<canvas id="growthChart"></canvas>
</div>  
</div>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="db.js"></script>
<script src="app.js"></script>

</body>
</html>
