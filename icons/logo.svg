<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0c1e3e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#5b9cf6"/>
      <stop offset="100%" style="stop-color:#7b5cf0"/>
    </linearGradient>
    <linearGradient id="green" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" style="stop-color:#22d17a;stop-opacity:0.6"/>
      <stop offset="100%" style="stop-color:#22d17a"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bg)"/>

  <!-- Subtle grid lines -->
  <line x1="80" y1="340" x2="432" y2="340" stroke="#1a2d50" stroke-width="1.5"/>
  <line x1="80" y1="280" x2="432" y2="280" stroke="#1a2d50" stroke-width="1.5"/>
  <line x1="80" y1="220" x2="432" y2="220" stroke="#1a2d50" stroke-width="1.5"/>

  <!-- Bar chart bars -->
  <rect x="100" y="260" width="52" height="80" rx="6" fill="url(#accent)" opacity="0.7"/>
  <rect x="175" y="200" width="52" height="140" rx="6" fill="url(#accent)" opacity="0.85"/>
  <rect x="250" y="230" width="52" height="110" rx="6" fill="url(#accent)"/>
  <rect x="325" y="170" width="52" height="170" rx="6" fill="url(#accent)"/>

  <!-- Rising trend line over bars -->
  <polyline
    points="126,255 201,195 276,215 351,155"
    fill="none"
    stroke="#22d17a"
    stroke-width="7"
    stroke-linecap="round"
    stroke-linejoin="round"/>

  <!-- Dots on trend line -->
  <circle cx="126" cy="255" r="9" fill="#22d17a"/>
  <circle cx="201" cy="195" r="9" fill="#22d17a"/>
  <circle cx="276" cy="215" r="9" fill="#22d17a"/>
  <circle cx="351" cy="155" r="11" fill="#22d17a" opacity="1"/>
  <!-- Glow on last dot -->
  <circle cx="351" cy="155" r="18" fill="#22d17a" opacity="0.25"/>

  <!-- Bottom baseline -->
  <line x1="80" y1="340" x2="432" y2="340" stroke="#1a2d50" stroke-width="2"/>

  <!-- App name text -->
  <text x="256" y="420" 
    font-family="'SF Pro Display', 'Segoe UI', Arial, sans-serif" 
    font-size="58" 
    font-weight="700" 
    fill="white" 
    text-anchor="middle"
    letter-spacing="-1">folio<tspan fill="url(#accent)">wise</tspan></text>
</svg>
